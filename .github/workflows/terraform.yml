name: Terraform CI/CD

on:
  push:
    branches: [main]        # main에 push/머지되면 → apply
  pull_request:
    branches: [main]        # main 대상 PR이면 → plan만

permissions:
  contents: read
  pull-requests: write      # PR에 plan 결과 코멘트 달기 위함

env:
  TF_VAR_db_admin_password: ${{ secrets.TF_VAR_db_admin_password }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform   # tf 파일들이 terraform 폴더에 있으므로

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true    # 포맷 안 맞아도 멈추진 않게 (경고만)

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve